name: create-extension-release

on:
  push:
    branches: [main]
    paths:
      - 'extensions/vscode-setup-agents-ui/package.json'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read versions
        id: versions
        run: |
          CURRENT=$(node -p "require('./extensions/vscode-setup-agents-ui/package.json').version")
          PREVIOUS=$(git show HEAD~1:extensions/vscode-setup-agents-ui/package.json 2>/dev/null \
            | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version" 2>/dev/null \
            || echo "0.0.0")
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "previous=$PREVIOUS" >> $GITHUB_OUTPUT
          echo "tag=ext-v$CURRENT" >> $GITHUB_OUTPUT

      - name: Check if tag already exists
        id: check
        run: |
          TAG="ext-v${{ steps.versions.outputs.current }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create tag and release
        if: steps.versions.outputs.current != steps.versions.outputs.previous && steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          TAG="${{ steps.versions.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Extension release $TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "VS Code extension release $TAG" \
            --verify-tag
