name: vscode-extension

on:
  push:
    branches: [main]
    paths:
      - 'extensions/vscode-setup-agents-ui/**'
      - '.github/workflows/vscode-extension.yml'
  pull_request:
    paths:
      - 'extensions/vscode-setup-agents-ui/**'
      - '.github/workflows/vscode-extension.yml'
  workflow_dispatch:
    inputs:
      publish:
        description: Publish extension to VS Code Marketplace
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  build-test-package:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extensions/vscode-setup-agents-ui
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: extensions/vscode-setup-agents-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

      - name: E2E tests (Playwright)
        run: npx playwright install chromium --with-deps && npm run test:e2e

      - name: Install vsce
        run: npm install --no-save @vscode/vsce

      - name: Package VSIX
        run: npx vsce package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-setup-agents-ui-vsix
          path: extensions/vscode-setup-agents-ui/*.vsix

      - name: Publish to Marketplace
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish == 'true' }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx vsce publish
